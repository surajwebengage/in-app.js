<!doctype html>
<html lang="en">
<meta charset="UTF-8">
<meta content="width=device-width,initial-scale=1,user-scalable=no" name="viewport">
<title>Zingoy - Spin & Win</title>
<script charset="utf-8" src="https://cdn.jsdelivr.net/npm/d3@3"></script>
<style>
    .close-button {
        color: #ffffff;
        z-index: 9999999;
    }

    .wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh
    }

    .modal-content {
        margin: 0 auto;
        width: 100%;
        background-color: #16449f
    }

    .modal-content .title {
        font-size: 18px;
        margin: 5px auto;
        text-align: center
    }

    .modal-content {
        background-color: #16449f
    }

    .logo {
        width: 80px;
        margin-top: 10px;
        margin-bottom: 5px
    }

    .birthday {
        width: 250px;
        margin-top: 10px
    }

    .title {
        color: #fff;
        font-size: 20px;
        font-weight: 600;
        text-align: center;
        line-height: 1.3;
        margin: 15px 0 20px;
        padding: 0 10px
    }

    .wheel-container {
        position: relative;
        width: 280px;
        margin: 0 auto
    }

    .pointer {
        position: absolute;
        top: -3px;
        left: 50%;
        transform: translateX(-50%);
        width: 25px;
        z-index: 10;
        transition: opacity .3s
    }

    #wheel {
        width: 100%;
        transition: transform 6s cubic-bezier(0.25, 0.1, 0.2, 1);
        cursor: pointer
    }

    .stand {
        width: 140px;
        margin-top: -30px;
        margin-bottom: 10px
    }

    .spin-btn {
        width: 260px;
        height: 52px;
        background: #fff;
        border: none;
        padding: 10px;
        border-radius: 10px;
        font-size: 18px;
        font-weight: 700;
        color: #0a3a91;
        margin: 10px 0;
        cursor: pointer;
        font-family: inherit;
        box-shadow: 0 4px 8px rgba(0, 0, 0, .2)
    }

    .spin-btn:active {
        transform: scale(.98)
    }

    .spin-btn:disabled {
        opacity: .6;
        transform: none
    }

    .rewardOverlay {
        position: fixed;
        inset: 0;
        background: #0a3a91;
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000
    }

    .fullReward {
        width: 100%;
        cursor: pointer;
        display: block;
        margin: 0 auto;
        height: 100%
    }

    .rewardWrap {
        width: 100%;
        max-width: 360px;
        text-align: center;
        padding: 20px
    }

    .rewardHeading {
        color: #ffe600;
        font-size: 36px;
        font-style: italic;
        font-weight: 700;
        margin: 0 0 8px
    }

    .rewardSubHeading {
        color: #fff;
        font-size: 18px;
        margin: 0 0 10px
    }

    .rewardCard {
        background: #fff;
        border-radius: 20px;
        padding: 24px 20px
    }

    .rewardImage {
        width: 150px;
        display: block;
        margin: 0 auto 10px
    }

    .rewardText {
        font-size: 20px;
        font-weight: 700;
        margin: 12px 0;
        color: #1a2c4e
    }

    .userText {
        margin: 12px 0;
        color: #000;
        font-size: 16px;
        font-weight: 400
    }

    .couponBox {
        width: 95%;
        border: 2px dashed #ff5d92;
        padding: 10px 15px;
        display: flex;
        margin: 10px auto;
        justify-content: space-between;
        align-items: center;
        border-radius: 10px;
        background: #fff
    }

    .couponCode {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 1px;
        color: #e63946
    }

    .copyBtn {
        width: 80%;
        height: 40px;
        background: #ff3b82;
        border: none;
        border-radius: 15px;
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        margin-top: 15px;
        cursor: pointer
    }

    .expiryText {
        margin-top: 12px;
        color: #666;
        font-size: 14px
    }

    .buyBtn {
        width: 100%;
        height: 48px;
        background: #0a3a91;
        border: none;
        border-radius: 10px;
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        margin-top: 10px;
        cursor: pointer
    }

    .toast {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e3a5f;
        color: #ffe600;
        padding: 10px 20px;
        border-radius: 40px;
        font-size: 14px;
        font-weight: 600;
        z-index: 100000;
        box-shadow: 0 4px 8px rgba(0, 0, 0, .3);
        pointer-events: none
    }

    #cc {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 99999;
        display: none
    }
</style><canvas id="cc"></canvas>
<div class="wrapper"><img alt="Zingoy" src="https://static-assets-services.s3.ap-south-1.amazonaws.com/Group+36352.png"
        class="logo"><img alt="Birthday Blast"
        src="https://static-assets-services.s3.ap-south-1.amazonaws.com/image+5+(1).png" class="birthday">
    <div class="title">Spin & Win Big! Where Every<br>Click is a Celebration</div>
    <div class="wheel-container"><img alt="pointer"
            src="https://static-assets-services.s3.ap-south-1.amazonaws.com/Group+7.png" class="pointer" id="pi"
            style="opacity:1;visibility:visible"><img alt="wheel"
            src="https://afiles.webengage.com/~15ba1dbb5/a0d09c18-5e53-4685-ac46-4d010bfbfa3d.png" id="wheel"
            style="transform:rotate(0)"></div><img alt="stand"
        src="https://afiles.webengage.com/~15ba1dbb5/f5fc92b0-2160-4266-8c6c-e13d80ef96b8.png" class="stand"><button
        class="spin-btn" onclick="spin()">Tap To Spin</button>
</div>
<div class="rewardOverlay" id="ro">
    <div id="rc"></div>
</div>
<script src="https://surajwebengage.github.io/in-app.js/nirajin-app.js"></script>
