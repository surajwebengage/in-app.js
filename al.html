<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KWD Spin · WhatsApp notification</title>

    <script src="https://cdn.rawgit.com/zarocknz/javascript-winwheel/2.6/Winwheel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/latest/TweenMax.min.js"></script>

    <style>
      @font-face {
        font-family: 'GillSansBold.otf';
        src: url('https://static-assets-services.s3.ap-south-1.amazonaws.com/Gill+Sans+Bold.otf')
          format('opentype');
      }

      @font-face {
        font-family: 'GillSansMedium.otf';
        src: url('https://static-assets-services.s3.ap-south-1.amazonaws.com/Gill+Sans+Medium.otf')
          format('opentype');
      }

      @font-face {
        font-family: 'GillSans.otf';
        src: url('https://static-assets-services.s3.ap-south-1.amazonaws.com/Gill+Sans.otf')
          format('opentype');
      }

      @font-face {
        font-family: 'GillSansCondensedBold.otf';
        src: url('https://static-assets-services.s3.ap-south-1.amazonaws.com/GillSans+Condensed+Bold.otf')
          format('opentype');
      }

      body {
        width: 300px;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0 auto;
        overflow: hidden;
      }

      td.the_wheel,
      canvas#canvas {
        width: 100%;
        max-width: 320px;
        background-size: cover;
        background-position: center;
      }

      span.t1 {
        font-size: 21px;
        color: #91553d;
        font-weight: 300;
        font-family: 'Gill Sans';
        text-align: center;
      }

      .kd1 {
        font-size: 16px;
        margin-bottom: 15px;
        color: #91553d;
        font-weight: 300;
        font-family: 'Gill Sans';
        text-align: center;
        text-align: center;
        line-height: 1.4;
      }

      .prize-message {
        margin-top: 15px;
        text-align: center;
      }

      .hidden-data {
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="we_header" style="padding-bottom: 10px; text-align: center"></div>

    <canvas id="canvas" width="700" height="700"></canvas>

    <div id="myList" style="text-align: center"></div>

    <div class="hidden-data">
      <span id="couponCode"></span>
      <span id="offerWon"></span>
    </div>

    <table style="width: 100%; text-align: center">
      <tr>
        <td>
          <div id="spin_button">
            <p
              style="
                padding: 10px;
                cursor: pointer;
                width: 70%;
                margin: auto;
                background: #b08f85;
                font-size: 26px;
                font-weight: 900;
                font-family: 'GillSansBold.otf';
                letter-spacing: 1px;
                color: #fff;
              "
              onclick="calculatePrize();"
            >
              SPIN NOW!
            </p>
          </div>
        </td>
      </tr>
    </table>

    <script>
      const SEGMENT_TEXTS = [
        'Try again',
        'Try again',
        '5KWD',
        '5KWD',
        '5KWD',
        '7KWD',
        '7KWD',
        '10KWD',
      ];

      const PRIZE_CODES = {
        '5KWD': 'Ramadan5',
        '7KWD': 'Ramadan7',
        '10KWD': 'Ramadan10',
      };

      const PRIZE_INDEXES = {
        'Try again': [0, 1],
        '5KWD': [2, 3, 4],
        '7KWD': [5, 6],
        '10KWD': [7],
      };

      const PROB_TABLE = [
        { prize: 'Try again', prob: 0.2 },
        { prize: '5KWD', prob: 0.3 },
        { prize: '7KWD', prob: 0.3 },
        { prize: '10KWD', prob: 0.2 },
      ];

      let theWheel = new Winwheel({
        numSegments: 8,
        outerRadius: 260,
        drawMode: 'image',
        rotationAngle: -14,
        segments: SEGMENT_TEXTS.map((t) => ({ text: t })),
        animation: {
          type: 'spinToStop',
          duration: 5,
          spins: 6,
          callbackFinished: 'logChore()',
        },
      });

      let wheelSpinning = false;

      function calculatePrize() {
        if (wheelSpinning) return;

        let rnd = Math.random();
        let cumulative = 0;
        let selectedPrize = null;

        for (let entry of PROB_TABLE) {
          cumulative += entry.prob;
          if (rnd < cumulative) {
            selectedPrize = entry.prize;
            break;
          }
        }

        let possibleIndexes = PRIZE_INDEXES[selectedPrize];
        let chosenIndex =
          possibleIndexes[Math.floor(Math.random() * possibleIndexes.length)];

        theWheel.animation.stopAngle = chosenIndex * 45 + 60;
        theWheel.startAnimation();

        wheelSpinning = true;
        // setTimeout(() => {
        //     document.getElementById("canvas").style.display = "none";
        // }, 100);
      }

      let img = new Image();
      img.onload = function () {
        theWheel.wheelImage = img;
        theWheel.draw();
      };
      img.src =
        'https://onsite-assets-editor.s3.amazonaws.com/images/we10a5cb699/Wheel_2_1.png';

      function logChore() {
        let seg = theWheel.getIndicatedSegment();
        let prizeText = seg.text;
        let code = PRIZE_CODES[prizeText] || '';

        document.getElementById('couponCode').textContent = code;
        document.getElementById('offerWon').textContent = prizeText;

        setTimeout(() => {
          window.parent.parent.postMessage(
            {
              type: 'couponCode',
              value: code,
              offerWon: prizeText,
            },
            '*'
          );
        }, 100);

        let msg = document.createElement('div');
        msg.className = 'prize-message';

        let headerMsg = document.createElement('div');
        headerMsg.className = 'prize-header';

        if (code) {
          headerMsg.innerHTML =
            "<span class='t1'>You have won " + prizeText + '</span>';

          msg.innerHTML =
            "<img src='https://afiles.webengage.com/11b564b63/0293e4ac-a91e-404a-b073-b556641f81a3.png' alt='Congratulations' style='display:block;max-width:70%;height:auto;margin: 0 auto;' /><br>" +
            "<div class='kd1'>YOUR EXCLUSIVE CODE IS ON ITS WAY <br> VIA WHATSAPP & EMAIL</div>" +
            "<a href='https://www.pngjewellers.com/collections/ramadan-offers' style='display:inline-block;padding:8px 10px;background-color:#c4a69f;color:#ffffff;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;border-radius:50px;font-weight:600;border:none;transition:all 0.3s ease;'>Explore Collection</a>";
            setTimeout(() => {
                document.getElementById("canvas").style.display = "none";
                document.getElementById("myList").style.marginTop = "40%";
            }, 500);
        } else {
          msg.innerHTML =
            "<span class='t1'>Better Luck!</span><br>" +
            "<div class='kd1'>" +
            prizeText +
            '</div>';
        }

        document.getElementById('myList').innerHTML = '';
        document.getElementById('myList').appendChild(msg);

        document.getElementById('we_header').innerHTML = '';
        document.getElementById('we_header').appendChild(headerMsg);

        document.getElementById('spin_button').style.display = 'none';
      }
    </script>
  </body>
</html>
