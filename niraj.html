<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Wheel</title>
    <style>

.modal-content {
    background-color: #e3003a;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
justify-content: center;
}

        .close-button {
            color: #000000;
            position: absolute;
            top: 0px;
            right: 0px;
            padding: 15px;
            font-size: 18px;
            z-index: 999999;
        }

        .modal-content {
            background-color: #e3003a;
        }

        h2 {
            font-size: 24px;
        }

        .wrapper {
            background-color: #e3003a;
             width: 300px;
        }

        .spin-button {
            width: 200px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: linear-gradient(358deg, #fefefe 0%, #e3003a 100%);
            transition: all 0.2s ease;
            border: 1px solid #fff;
        }

        .spin-button span {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            text-shadow:
                0px 2px 0px #ff7a7a,
                0px 3px 6px rgba(0, 0, 0, 0.3);
        }

        /* press effect */
        .spin-button:active {
            transform: translateY(4px);
            box-shadow:
                0px 2px 0px #b30021,
                0px 6px 12px rgba(0, 0, 0, 0.2),
                inset 0px 2px 8px rgba(255, 255, 255, 0.4);
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 50px auto;
        }

        #wheel {
            width: 100%;
            transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            z-index: 10;
        }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            z-index: 5;
        }

        #weResultOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            z-index: 99999;
            cursor: pointer;
        }

        /* Result container for button positioning */
        .result-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #weResultOverlay img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Updated button style to match SAVE10 design */
        .copy-btn {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #FFD700; /* Yellow background */
            color: #e3003a; /* Red text */
            border: none;
            border-radius: 6px;
            padding: 14px 32px;
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            z-index: 100;
            transition: all 0.2s ease;
            letter-spacing: 1px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.3);
        }

        .copy-btn:active {
            transform: translate(-50%, -50%) scale(0.97);
        }

        button {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body style="text-align:center;">
    <h2 style="color:white;">لــف العـجـــلة الجــوائز بانتظـــارك</h2>
    <div class="wheel-container">
        <img class="pointer" src="https://static-assets-services.s3.ap-south-1.amazonaws.com/Wheel+Pointer.svg" />
        <img id="wheel" src="https://i.ibb.co/m5b4bRVJ/Spin-the-wheel-the-prizes-are-waiting-for-you.png" />
        <img class="center" src="https://static-assets-services.s3.ap-south-1.amazonaws.com/Wheel+Center+Circle.svg" />
    </div>
    <button class="spin-button" onclick="spin();">
        <span>اضغط للبدء</span>
    </button>
    <div id="weResultOverlay">
        <div class="result-wrapper">
            <img id="weResultImg">
            <button id="copyButton" class="copy-btn" style="display: none;" onclick="copyPrizeCode(event);"></button>
        </div>
    </div>
    <script>
        var rotation = 0;
        var spinning = false;
        var currentPrizeCode = "";
        var currentPrizeName = "";

        var weDATA = [
            { weName: "100 ريال", img: "https://afiles.webengage.com/~15ba1dbb5/b3a53b5b-d3ff-432b-9188-317c394261d0.png", prizeCode: "Mega100", probability: 0.0001, showButton: true },
            { weName: "شحن مجاني", img: "https://afiles.webengage.com/~15ba1dbb5/3074f77a-2369-4d83-b142-4f88385f53ce.png", prizeCode: "FREESHIP", probability: 0.0001, showButton: true },
            { weName: "خصم 10%", img: "https://afiles.webengage.com/~15ba1dbb5/9bd87222-23e3-4941-8163-e26de577ebb5.png", prizeCode: "SAVE10", probability: 5, showButton: true },
            { weName: "حظاً أوفر", img: "https://afiles.webengage.com/~15ba1dbb5/f1a506d9-b267-4ea2-9c8d-7b269030e17c.png", prizeCode: "", probability: 1, showButton: false },
            { weName: "خصم 3%", img: "https://afiles.webengage.com/~15ba1dbb5/ece340c9-09dc-4bc9-ade7-0d27d44ef010.png", prizeCode: "SAVE3", probability: 93.9998, showButton: true }
        ];

        function getWeightedIndex(data) {
            let total = data.reduce((sum, d) => sum + d.probability, 0);
            let rand = Math.random() * total;

            let cumulative = 0;
            for (let i = 0; i < data.length; i++) {
                cumulative += data[i].probability;
                if (rand <= cumulative) return i;
            }
            return data.length - 1;
        }

        // Copy function - copies the prize code and changes button text to "Copied!" temporarily, then reverts back to original code
        function copyPrizeCode(event) {
            event.stopPropagation();
            if (currentPrizeCode) {
                navigator.clipboard.writeText(currentPrizeCode).then(function() {
                    var btn = document.getElementById("copyButton");
                    // Store the original text (the prize code)
                    var originalText = btn.textContent;
                    // Change button text to "Copied!"
                    btn.textContent = 'Copied!';
                    // After 1.5 seconds, revert back to the original prize code
                    setTimeout(function() {
                        btn.textContent = originalText;
                    }, 1500);
                }).catch(function() {
                    // Fallback in case clipboard fails - but no alert, just update button temporarily
                    var btn = document.getElementById("copyButton");
                    var originalText = btn.textContent;
                    btn.textContent = 'Copied!';
                    setTimeout(function() {
                        btn.textContent = originalText;
                    }, 1500);
                    // Also try to copy using a hidden input method without alert
                    var tempInput = document.createElement("input");
                    tempInput.value = currentPrizeCode;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                });
            }
        }

        function spin() {
            if (spinning) return;
            spinning = true;
            var wheel = document.getElementById("wheel");
            var sliceDeg = 360 / weDATA.length;
            var selectedIndex = getWeightedIndex(weDATA);
            var sliceCenter = (selectedIndex * sliceDeg) + (sliceDeg / 2);
            rotation = rotation % 360;
            var finalRotation = 360 * 5 + (350 - sliceCenter);
            rotation += finalRotation;
            wheel.style.transform = "rotate(" + rotation + "deg)";

            setTimeout(function () {
                var result = weDATA[selectedIndex];
                currentPrizeCode = result.prizeCode;
                currentPrizeName = result.weName;
                document.getElementById("weResultImg").src = result.img;
                var copyBtn = document.getElementById("copyButton");
                if (result.showButton && result.prizeCode) {
                    copyBtn.style.display = "block";
                    copyBtn.textContent = result.prizeCode;
                } else {
                    copyBtn.style.display = "none";
                }
                document.getElementById("weResultOverlay").style.display = "flex";
                spinning = false;
            }, 4200);
        }

        document.getElementById("weResultOverlay").addEventListener("click", function() {
            this.style.display = "none";
        });
    </script>
</body>

</html>
